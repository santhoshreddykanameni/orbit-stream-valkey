version: "3.9"

services:
  valkey:
    image: valkey/valkey:8

    container_name: valkey

    restart: unless-stopped

    ports:
      - "6379:6379"

    command:
      [
        "valkey-server",
        "--requirepass",
        "orbit-stream",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--save",
        "60",
        "1000",
        "--maxmemory",
        "4gb",
        "--maxmemory-policy",
        "noeviction",
      ]

    volumes:
      - valkey-data:/data

    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "orbit-stream", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  valkey-data:
